app:
  env: development
  log_level: INFO
  log_format: json      # json | text

etl:
  batch_size: 50_000
  partition_columns: ["date", "region"]
  checkpoint_location: ./data/checkpoints
  delta_path: ./data/delta
  target_daily_records: 15_000_000   # 10M–15M as per production spec
  pipeline_reliability_target: 0.998

ml_pipeline:
  models:
    - xgboost
    - lightgbm
    - random_forest
  cv_folds: 5
  test_size: 0.2
  random_state: 42
  early_stopping_rounds: 50
  n_jobs: -1
  artifacts_dir: ./models

mlflow:
  experiment_name: ml-platform
  tracking_uri: http://localhost:5000
  auto_log: true
  log_artifacts: true

nlp:
  model_name: bert-base-uncased
  spacy_model: en_core_web_sm
  max_length: 512
  batch_size: 32
  confidence_threshold: 0.75
  categories:
    - compliance
    - legal
    - financial
    - operational
    - other

serving:
  host: 0.0.0.0
  port: 8000
  workers: 4
  timeout: 30
  cache_ttl_seconds: 300
  rate_limit_per_minute: 1000

monitoring:
  metrics_port: 9090
  drift_check_interval_hours: 24
  alert_accuracy_threshold: 0.85
